# ============================================================
# Öffentliche Bereiche
# ============================================================

soccerbet.standings:
  path: '/soccerbet/standings/{tournament_id}'
  defaults:
    _controller: '\Drupal\soccerbet\Controller\StandingsController::standings'
    _title: 'Rangliste'
    tournament_id: 0
  requirements:
    _permission: 'access soccerbet content'
    tournament_id: '\d*'

soccerbet.standings.group:
  path: '/soccerbet/standings/{tournament_id}/gruppe/{group_slug}'
  defaults:
    _controller: '\Drupal\soccerbet\Controller\StandingsController::standingsGroup'
    _title: 'Gruppen-Rangliste'
  requirements:
    _permission: 'access soccerbet content'
    tournament_id: '\d+'

soccerbet.standings_step:
  path: '/soccerbet/standings/{tournament_id}/step/{limit}'
  defaults:
    _controller: '\Drupal\soccerbet\Controller\StandingsController::standingsStep'
    _title: 'Rangliste nach Spielrunde'
  requirements:
    _permission: 'access soccerbet content'
    tournament_id: '\d+'
    limit: '\d+'

soccerbet.standings_tipper:
  path: '/soccerbet/standings/{tournament_id}/tipper/{tipper_id}'
  defaults:
    _controller: '\Drupal\soccerbet\Controller\StandingsController::tipperDetail'
    _title: 'Tipper-Detail'
  requirements:
    _permission: 'access soccerbet content'
    tournament_id: '\d+'
    tipper_id: '\d+'

soccerbet.tables:
  path: '/soccerbet/tables/{tournament_id}'
  defaults:
    _controller: '\Drupal\soccerbet\Controller\TablesController::tables'
    _title: 'Gruppentabellen'
    tournament_id: 0
  requirements:
    _permission: 'access soccerbet content'
    tournament_id: '\d*'

soccerbet.place_bets:
  path: '/soccerbet/tipps'
  defaults:
    _form: '\Drupal\soccerbet\Form\PlaceBetsForm'
    _title: 'Tipps abgeben'
  requirements:
    _permission: 'place soccerbet bets'

# ============================================================
# Admin: Übersicht
# ============================================================

soccerbet.admin:
  path: '/soccerbet/admin'
  defaults:
    _controller: '\Drupal\soccerbet\Controller\AdminController::overview'
    _title: 'Tippspiel-Administration'
  requirements:
    _permission: 'administer soccerbet'

