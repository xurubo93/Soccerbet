soccerbet.settings:
  type: config_object
  label: 'Soccerbet-Einstellungen'
  mapping:
    default_tournament:
      type: integer
      label: 'Standard-Turnier ID'
    points_exact:
      type: integer
      label: 'Punkte für exaktes Ergebnis'
    points_tendency:
      type: integer
      label: 'Punkte für richtige Tendenz'
    betting_closes_minutes_before:
      type: integer
      label: 'Tipp-Sperre X Minuten vor Anpfiff'
    show_payment_status_in_standings:
      type: boolean
      label: 'Zahlungsstatus in Rangliste anzeigen'
    allow_tipper_self_register:
      type: boolean
      label: 'Selbst-Registrierung als Tipper erlauben'
    score_update_enabled:
      type: boolean
      label: 'Automatisches Score-Update aktivieren'
    api_provider:
      type: string
      label: 'API-Anbieter'
    footballdata_api_key:
      type: string
      label: 'API-Key für football-data.org'
